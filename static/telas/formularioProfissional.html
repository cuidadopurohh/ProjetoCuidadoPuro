<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Competências - Cuidado Puro</title>
    <link rel="stylesheet" href="../css/formularioProfissional.css">
</head>

<body>

    <header class="navbar">
        <div class="logo">
            <a href="../index.html"><img src="/telas/img/logo_(2).png" alt="Logo"></a>
            <a href="../index.html" class="logo-text">Cuidado Puro</a>
        </div>
        <nav>
            <ul class="nav-links">
                <li><a href="/index.html">Início</a></li>
                <li><a href="/telas/beneficios.html">Benefícios</a></li>
                <li><a href="/telas/sobre.html">Sobre</a></li>
                <li><a href="/telas/opinioes.html">Opiniões</a></li>
                <li><a href="#">Contato</a></li>
            </ul>
        </nav>
        <button href="/telas/telaLogin.html" class="btn-login">Entrar</button>
    </header>

    <main class="form-container">
        <div class="form-header">
            <h1>Questionario do profissional</h1>
            <p>Identifique suas especializações e capacitações de suporte ão paciente.</p>
        </div>

        <div class="quiz-card">
            <form id="formProfissional" action="#" method="POST">

                <h2 class="section-title" style="margin-top: 0;">Identificação e Registro Profissional</h2>

                <div class="input-grid">

                    <div class="field-group">
                        <label for="prof-registro">
                            Registro Profissional
                        </label>

                        <input type="text" id="prof-registro" placeholder="COREN, COFFITO ou Certificado" required>
                    </div>

                    <div class="field-group">
                        <label for="prof-experiencia">
                            Tempo de Experiência em Home Care
                        </label>

                        <select id="prof-experiencia" required>
                            <option value="" disabled selected>
                                Selecione o tempo...
                            </option>

                            <option value="menos-1">Menos de 1 ano</option>
                            <option value="1-3">De 1 a 3 anos</option>
                            <option value="3-5">De 3 a 5 anos</option>
                            <option value="mais-5">Mais de 5 anos</option>
                        </select>
                    </div>

                </div>

                <h2 class="section-title">Área de Atuação e Especialidade Principal</h2>
                <label style="font-size: 0.95rem; opacity: 0.9; display: block; margin-bottom: 10px;">Qual é a sua
                    principal vertente de atendimento humanizado?</label>

                <div class="selection-grid">
                    <label class="selection-option">
                        <input type="radio" name="especialidade-principal" value="geriatria" checked>
                        <div class="selection-box">
                            <span>👴</span>
                            Gerontologia e Idosos
                            <p>Suporte a idosos com perda de autonomia ou demências.</p>
                        </div>
                    </label>

                    <label class="selection-option">
                        <input type="radio" name="especialidade-principal" value="complexo">
                        <div class="selection-box">
                            <span>👨‍⚕️</span>
                            Cuidados Complexos
                            <p>Pacientes acamados, pós-cirúrgicos ou com dispositivos.</p>
                        </div>
                    </label>

                    <label class="selection-option">
                        <input type="radio" name="especialidade-principal" value="pcd">
                        <div class="selection-box">
                            <span>♿</span>
                            Necessidades Especiais
                            <p>Atendimento inclusivo a PCDs e condições crônicas de saúde.</p>
                        </div>
                    </label>
                </div>

                <h2 class="section-title">Procedimentos Clínicos e Dispositivos</h2>

                <div class="field-group">
                    <label for="prof-dispositivos">Selecione os procedimentos e dispositivos com os quais possui total
                        domínio prático:</label>
                    <select id="prof-dispositivos" required>
                        <option value="" disabled selected>Selecione a sua maior aptidão...</option>
                        <option value="sondas">Administração de Dietas (Sonda Nasoenteral / GTT)</option>
                        <option value="oxigenio">Oxigenoterapia e Cuidados com Traqueostomia</option>
                        <option value="curativos">Tratamento de Lesões e Curativos Complexos</option>
                        <option value="medicacao">Administração de Medicamentos Injetáveis / Subcutâneos</option>
                        <option value="suporte-basico">Apenas Suporte de Vida Básico e Higiene/Conforto</option>
                    </select>
                </div>

                <div class="field-group">
                    <label for="prof-detalhes">Descreva brevemente suas capacitações, cursos complementares e
                        experiências relevantes:</label>
                    <textarea id="prof-detalhes" rows="4"
                        placeholder="Ex: Especialização em Cuidados Paliativos..."></textarea>
                </div>

                <div class="form-actions">
                    <button type="button" class="btn-back">Voltar</button>
                    <button type="submit" class="btn-cadastrar button">Finalizar Cadastro</button>
                </div>

            </form>
        </div>
    </main>
<script src="../js/formularioProfissional.js"></script>
</body>

</html>
