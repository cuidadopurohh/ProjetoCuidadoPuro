services:
  - type: web
    name: ProjetoCuidadoPuro Backend
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT

  - type: static_site
    name: ProjetoCuidadoPuro Frontend
    env: static
    plan: free
    staticPublishPath: static
